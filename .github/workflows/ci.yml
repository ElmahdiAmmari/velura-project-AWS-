name: Velura Cloud Platform CI/CD

# Déclenchement automatique à chaque push sur la branche main
on:
  push:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : VALIDATION (Test du Backend)
  test-backend:
    runs-on: ubuntu-latest
    
    # On lance une base de données éphémère pour les tests
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: velura_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Backend Tests
        env:
          # On utilise l'IP de l'hôte pour Docker car le service db est mappé sur 5432
          DATABASE_URL: postgresql://postgres:password@localhost:5432/velura_db
          SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
        run: |
          cd backend
          python test_main.py

  # ÉTAPE 2 : LIVRAISON (Build et Push sur Docker Hub)
  build-and-push:
    needs: test-backend # Sécurité : On ne livre rien si les tests échouent
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # Ton Access Token (PAT)

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/velura-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/velura-frontend:latest