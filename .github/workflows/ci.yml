name: Velura Cloud Platform CI

on:
  push:
    branches: [ main, Frontend-Mouatassem ]
  pull_request:
    branches: [ main ]

jobs:
  # ÉTAPE 1 : TESTS DU BACKEND
  test-backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: velura_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/velura_db
          SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
        run: |
          cd backend
          python test_main.py

  # ÉTAPE 2 : BUILD DES IMAGES DOCKER
  build-images:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        run: docker build ./backend -t velura-backend:latest

      - name: Build Frontend Image
        run: docker build ./frontend -t velura-frontend:latest

  build-and-push:
    needs: test # Ne s'exécute QUE si les tests passent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/velura-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/velura-frontend:latest