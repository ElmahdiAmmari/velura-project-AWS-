  # MySQL container is commented, replaced by AWS RDS
  # mysql:
  #   image: mysql:8.0
  #   container_name: clothes_mysql
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #     MYSQL_DATABASE: ${MYSQL_DATABASE}
  #   ports:
  #     - "3307:3306"
