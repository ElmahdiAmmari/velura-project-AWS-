# Reverse proxy global (service gateway optionnel sur le réseau Docker).
# Montez ce fichier sur un conteneur nginx dédié si vous voulez un point d'entrée unique.
# L'application frontend appelle encore les APIs via FRONTEND_*_URL (ports directs ou ALB).

upstream velura_frontend {
    server frontend:80;
}

server {
    listen 80;

    location / {
        proxy_pass http://velura_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
